# ====== CORE SETTINGS ======
set -g escape-time 0                     # Faster escape sequence detection
set -sg terminal-overrides ",*:RGB"      # Enable true color support
set -g focus-events on                   # For better terminal integration
set -g default-terminal "tmux-256color"  # Better terminal type
set-option -g status-keys vi             # Vi mode in status line
set-option -g mode-keys vi               # Vi mode for copy mode

# ====== MOUSE ======
set -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M

# ====== VISUAL ENHANCEMENTS ======
set -g base-index 1           # Start window numbering at 1
setw -g pane-base-index 1     # Start pane numbering at 1
set -g renumber-windows on    # Renumber windows when one is closed
set -g set-titles on          # Set terminal title
set -g set-titles-string "#T - #W"  # Window name and session name

# ====== KEY BINDING IMPROVEMENTS ======
# Unbind default prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Better pane splitting
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Pane navigation (vim style)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick window selection
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# ====== COPY MODE ENHANCEMENTS ======
# Enter copy mode with vi keybindings
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# ====== STATUS BAR ENHANCEMENTS ======
set -g status-interval 1      # Update status every second
set -g status-justify left  # Center status bar
set -g status-position top    # Status bar at top

set -g window-status-format ""
set -g window-status-current-format ""
set -g status-left "#[fg=#{@thm_mantle},bg=#{@thm_mauve}]  #[fg=#{@thm_fg},bg=#{@thm_surface_0}] #(whoami)@#h"
set -g status-right "#[fg=#{@thm_mantle},bg=#{@thm_mauve}] %I:%M %p"

# ====== PLUGINS ======
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tmux-yank'          # Better yank support
set -g @plugin 'christoomey/vim-tmux-navigator'  # Seamless vim navigation
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "none"

# ====== CUSTOM SHORTCUTS ======
# Quick reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Clear screen and scrollback
bind C-l send-keys 'C-l'

# Toggle synchronize panes
bind y set-window-option synchronize-panes

# Quick pane layout switching
bind Space next-layout

# Maximize current pane (zoom toggle)
bind z resize-pane -Z

# Kill pane without confirmation
bind x kill-pane

# Create new session
bind C new-session

# ====== PERFORMANCE ======
set -g history-limit 10000          # Increase scrollback buffer
set -g buffer-limit 20              # Limit number of buffers
set -g display-time 2000            # Display messages for 2 seconds
set -g display-panes-time 2000      # Display pane numbers for 2 seconds

# ====== TPM INSTALLATION ======
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'
